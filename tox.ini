[tox]
min_version = 4.0
requires = tox-uv>=1
env_list =
    py{310,311,312,313,314},
    mypy,
    pd{15,2,3},
    cpx{2010,2210,2211,2212},
    grb{12,13},
    xprs{94,95,96,97,98}

[gh]
python =
    3.10 = py310, mypy, pd{15,2}
    3.11 = py311
    3.12 = py312, pd3
    3.13 = py313
    3.14 = py314

[testenv]
description = Run doctests, unit tests, and functional tests
set_env =
    PY_IGNORE_IMPORTMISMATCH = 1
extras =
    tests
    solver-apis
package = wheel
wheel_build_env = .pkg
commands = pytest --basetemp={env_tmp_dir} {posargs}

[testenv:py314]
description = Run doctests, unit tests, and functional tests except for Xpress {env_name}
deps =
    cplex>=20.1.0.4
    docplex>=2.25.236
    gurobipy>=11.0.0
extras = tests
commands = pytest --basetemp={env_tmp_dir} \
            --ignore=src/opti_extensions/xpress/ \
            --ignore=tests/unit_tests/xpress_var_dicts_funcs/ \
            --ignore-glob=tests/functional_tests/xpress_*.py \
            {posargs}

[testenv:mypy]
description = Run static type checks and typing tests with mypy
base_python = 3.10
commands =
    mypy src
    mypy tests/typing_tests

[testenv:pd{15,2,3}]
description = Run unit tests and doctests for pandas accessors against pandas {env_name}
base_python =
    pd15,pd2: 3.10
    pd3: 3.12
deps =
    pd15: pandas>=1.5,<2
    pd15: numpy<2.0
    pd2: pandas>=2,<3
    pd3: pandas>=3,<4
commands = pytest --basetemp={env_tmp_dir} --no-cov \
            src/opti_extensions/_pandas_accessors.py \
            tests/unit_tests/pandas_accessors/ \
            tests/functional_tests/docplex_multicommodity_test.py \
            tests/functional_tests/gurobipy_multicommodity_test.py \
            tests/functional_tests/xpress_multicommodity_test.py \
            {posargs}

[testenv:cpx{2010,2210,2211,2212}]
description = Run unit tests for model functions against CPLEX {env_name}
base_python = 3.10
deps =
    cpx2010: cplex>=20.1.0,<22.1.0
    cpx2210: cplex>=22.1.0,<22.1.1
    cpx2211: cplex>=22.1.1,<22.1.2
    cpx2212: cplex>=22.1.2,<22.1.3
    docplex>=2.25.236
extras = tests
commands = pytest --basetemp={env_tmp_dir} --no-cov \
            tests/unit_tests/docplex_model_funcs/ \
            tests/unit_tests/docplex_var_dicts_funcs/ \
            tests/functional_tests/docplex_diet_test.py \
            tests/functional_tests/docplex_multicommodity_test.py \
            {posargs}

[testenv:grb{12,13}]
description = Run unit tests for model functions against Gurobi {env_name}
base_python = 3.10
deps =
    grb12: gurobipy>=12,<13
    grb13: gurobipy>=13,<14
extras = tests
commands = pytest --basetemp={env_tmp_dir} --no-cov \
            tests/unit_tests/gurobipy_var_dicts_funcs/ \
            tests/functional_tests/gurobipy_diet_test.py \
            tests/functional_tests/gurobipy_multicommodity_test.py \
            {posargs}

[testenv:xprs{94,95,96,97,98}]
description = Run unit tests for model functions against Xpress {env_name}
base_python = 3.10
deps =
    xprs94: xpress>=9.4,<9.5
    xprs95: xpress>=9.5,<9.6
    xprs96: xpress>=9.6,<9.7
    xprs97: xpress>=9.7,<9.8
    xprs98: xpress>=9.8,<9.9
extras = tests
commands = pytest --basetemp={env_tmp_dir} --no-cov \
            tests/unit_tests/xpress_var_dicts_funcs/ \
            tests/functional_tests/xpress_diet_test.py \
            tests/functional_tests/xpress_multicommodity_test.py \
            {posargs}
