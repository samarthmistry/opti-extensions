name: Tests

on:
  push:
    branches: ['**']
    tags-ignore: ['*']

jobs:
  check_changes:
    name: Check if changes necessitate test runs

    if: ${{ ! contains(github.event.head_commit.message, 'Merge pull request') }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changed python files or pyproject.toml
        id: changed-py-files
        run: |
          git fetch origin main
          if git diff --name-only origin/main HEAD | grep -qE '\.py$|^pyproject\.toml$'; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

    outputs:
      any_changed: ${{ steps.changed-py-files.outputs.any_changed }}

  run_tests_1:
    name: Run test group 1

    needs: check_changes

    if: needs.check_changes.outputs.any_changed == 'true'

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Install tox and its GitHub action plugin
        run: uv tool install tox --with tox-gh --with tox-uv

      - name: Setup tox environments and run test suite
        run: tox

  run_tests_2:
    name: Run test group 2

    needs: check_changes

    if: needs.check_changes.outputs.any_changed == 'true'

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        group:
          - name: cplex
            envs: cpx2010,cpx2210,cpx2211,cpx2212
          - name: gurobi
            envs: grb12,grb13
          - name: xpress
            envs: xprs94,xprs95,xprs96,xprs97,xprs98
          - name: highs
            envs: highs111,highs112,highs113,highs114
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Install tox and its GitHub action plugin
        run: uv tool install tox --with tox-gh --with tox-uv

      - name: Run solver tests
        run: tox -e ${{ matrix.group.envs }}
